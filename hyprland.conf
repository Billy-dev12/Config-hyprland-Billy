# ###########################################

# Application binds
bind = $mod, A, killactive
bind = $mod, B, exec, google-chrome-stable --enable-blink-features=MiddleClickAutoscroll --force-device-scale-factor=1
bind = $mod, F, fullscreen, 1
bind = $mod SHIFT, F, fullscreen, 0
bind = $mod, Q, exec, kitty
bind = $mod, C, killactive
bind = $mod SHIFT, Q, exit
bind = $mod, E, exec, pcmanfm
bind = $mod, D, exec, rofi -show drun
bind = $mod, P, pseudo
bind = $mod, ESCAPE, exec, sudo systemctl suspend
bind = $mod, W, exec, onlyoffice-desktopeditors --force-scale=1.6
bind = $mod, O, exec, systemd-run --user --scope -p MemoryMax=1.5G -p MemoryHigh=1G antigravity-ide

# Audio controls
bind = , XF86AudioMute, exec, ~/.config/hypr/scripts/volume mute
bind = , XF86AudioLowerVolume, exec, ~/.config/hypr/scripts/volume down
bind = , XF86AudioRaiseVolume, exec, ~/.config/hypr/scripts/volume up
bind = , XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle

# Brightness controls (fixed bindle to bind)
bind = , XF86MonBrightnessUp, exec, ~/.config/hypr/scripts/brightness up
bind = , XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/brightness down

# System utilities
bind = $mod SHIFT, C, exec, bash ~/.config/hypr/scripts/hyprPicker.sh
bind = $mod SHIFT, E, exec, wlogout
bind = $mod, T, togglefloating
bind = $mod SHIFT, P, exec, pomotroid --in-process-gpu
bind = $mod SHIFT, W, exec, setwall

# Screenshot and recording
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = $mod, R, exec, wf-recorder -g "$(slurp)"

# Screenshot area terus edit pake Swappy (Tekan ALT + Print)
bind = ALT, Print, exec, grim -g "$(slurp)" - | swappy -f -

# Screenshot satu layar penuh ke folder Pictures (Tekan SHIFT + Print)
bind = SHIFT, Print, exec, grim ~/Pictures/$(date +'%Y-%m-%d-%H%M%S_screenshot.png')

# Emoji selector
bind = $mod, +, exec, rofi -modi emoji -show emoji

# Layout management
bind = $mod SHIFT, RETURN, layoutmsg, swapwithmaster

# Focus movement
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r

# Resize windows
bind = $mod, left, resizeactive, -40 0
bind = $mod, right, resizeactive, 40 0
bind = $mod, up, resizeactive, 0 -40
bind = $mod, down, resizeactive, 0 40

# Move windows
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d

# Workspace switching
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move windows to workspaces
bind = $mod SHIFT, 1, movetoworkspacesilent, 1
bind = $mod SHIFT, 2, movetoworkspacesilent, 2
bind = $mod SHIFT, 3, movetoworkspacesilent, 3
bind = $mod SHIFT, 4, movetoworkspacesilent, 4
bind = $mod SHIFT, 5, movetoworkspacesilent, 5
bind = $mod SHIFT, 6, movetoworkspacesilent, 6
bind = $mod SHIFT, 7, movetoworkspacesilent, 7
bind = $mod SHIFT, 8, movetoworkspacesilent, 8
bind = $mod SHIFT, 9, movetoworkspacesilent, 9
bind = $mod SHIFT, 0, movetoworkspacesilent, 10

# system 
bind = $mod , S, exec, systemctl poweroff
