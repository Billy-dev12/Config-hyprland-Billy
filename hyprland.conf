# You have to change this based on your monitor 
monitor=eDP-1,1920x1080@60,0x0,1.25

# Import Matugen Color Scheme
source = ~/.config/hypr/colors.conf

# Environment Variables (Hyprland 0.54 Standard)
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt5ct
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

# Status bar :) 
exec-once=waybar

# Notification 
exec-once=dunst
# Wallpaper
exec-once=swaybg -o \* -i ~/.config/hypr/wallpapers/current.jpg -m fill
# For screen sharing 
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
# For keyboard 
exec-once=fcitx5 -D
# For lockscreen
exec-once=swayidle -w timeout 200 'swaylock-fancy'
# Start Page
exec-once=~/.config/hypr/scripts/startpage.sh

# Bluetooth
exec-once=blueman-applet # Make sure you have installed blueman

# Screen Sharing 
exec-once=systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once=~/.config/hypr/scripts/screensharing.sh

input {
  # Remap Capslock -> Esc for Vim users  
  kb_options=caps:super
  repeat_rate=50
  repeat_delay=240

  touchpad {
    disable_while_typing=1
    natural_scroll=1
    clickfinger_behavior=1
    middle_button_emulation=0
    tap-to-click=1
  }
}

gesture = 3, horizontal, workspace

general {
    layout=dwindle
    resize_on_border=true
    extend_border_grab_area=15
    hover_icon_on_border=true
    gaps_in=5
    gaps_out=20
    border_size=2
    col.active_border=$primary
    col.inactive_border=$outline_variant
}


decoration {
    rounding=18

    active_opacity=0.96
    inactive_opacity=0.96
    
    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = true
    }

    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = $primary
        color_inactive = 0x50000000
    }

    screen_shader = ~/.config/hypr/saturate.frag
}

layerrule = blur on, match:namespace waybar
layerrule = blur on, match:namespace lockscreen

animations {
    enabled=1
    # bezier=overshot,0.05,0.9,0.1,1.1
    bezier=overshot,0.13,0.99,0.29,1.1
    animation=windows,1,4,overshot,popin
    animation=fade,1,10,default
    animation=workspaces,1,6,overshot,slide
    animation=border,1,10,default
}

dwindle {
    # pseudotile=1
    # force_split=2
    force_split=0
    smart_resizing=true 
}

master {
  new_on_top=true
}

misc {
  disable_hyprland_logo=true
  disable_splash_rendering=true
  mouse_move_enables_dpms=true
  # vfr = false
}

xwayland {
  force_zero_scaling = true
}

