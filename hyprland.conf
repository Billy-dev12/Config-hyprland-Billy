# Smart Gaps (No gaps when only one window) - Updated syntax
windowrule = border_size 0, match:workspace name:w[tv1]
windowrule = rounding 0, match:workspace name:w[tv1]
windowrule = border_size 0, match:workspace name:f[1]
windowrule = rounding 0, match:workspace name:f[1]

# Float Necessary Windows - Updated syntax
windowrule = float on, match:class ^(Rofi)$
windowrule = float on, match:class ^(pavucontrol)$
windowrule = float on, match:class ^()$, match:title ^(Picture in picture)$
windowrule = float on, match:class ^(brave)$, match:title ^(Save File)$
windowrule = float on, match:class ^(brave)$, match:title ^(Open File)$
windowrule = float on, match:class ^(LibreWolf)$, match:title ^(Picture-in-Picture)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(org.twosheds.iwgtk)$
windowrule = float on, match:class ^(blueberry.py)$
windowrule = float on, match:class ^(xdg-desktop-portal-gtk)$
windowrule = float on, match:class ^(geeqie)$

# Increase the opacity - Updated syntax
windowrule = opacity 0.92, match:class ^(Thunar)$
windowrule = opacity 0.96, match:class ^(discord)$
windowrule = opacity 0.9, match:class ^(VSCodium)$
windowrule = opacity 0.88, match:class ^(obsidian)$
windowrule = opacity 1, match:class ^(neovim)$
windowrule = tile on, match:class ^(librewolf)$
windowrule = tile on, match:class ^(spotify)$


# Mouse bindings
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

$mod = SUPER

